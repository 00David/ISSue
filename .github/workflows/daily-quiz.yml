name: Generate Daily Quiz

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate-quiz:
    runs-on: ubuntu-latest
    
    steps:
      - name: Call quiz generation endpoint
        run: |
          curl -X POST https://issue-87qt.onrender.com/api/external/generate-quiz \
            -H "Content-Type: application/json" \
            --fail --show-error --silent
      
      - name: Notify on failure
        if: failure()
        run: echo "Quiz generation failed!"
